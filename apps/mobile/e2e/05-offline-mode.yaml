appId: eu.drafto.mobile
---
# Flow 05: Offline mode — airplane mode toggle, verify local data persists
# Depends on: 03-create-edit-note (E2E Final Note / Renamed E2E Note exists)
# Tests: offline indicator, offline note creation, offline editing,
#         data persistence across app restart while offline, sync on reconnect

- launchApp

# Navigate to the test notebook
- assertVisible:
    text: "Notebooks"
    timeout: 10000
- tapOn: "E2E Test Notebook"

# Verify existing note is visible before going offline
- assertVisible:
    text: "Renamed E2E Note"
    timeout: 5000

# --- Test 1: Enable airplane mode and verify offline indicator ---
- toggleAirplaneMode

- assertVisible:
    text: "Offline"
    timeout: 5000

# --- Test 2: Create a note while offline ---
- tapOn:
    id: "add"
- tapOn: "Note title (optional)"
- inputText: "Offline Note"
- tapOn:
    id: "checkmark"

# Verify the offline note appears in the local list
- assertVisible: "Offline Note"

# --- Test 3: Edit an existing note while offline ---
- tapOn: "Renamed E2E Note"
- assertVisible:
    text: "Renamed E2E Note"
    timeout: 5000

# Verify auto-save indicator works offline (saved locally)
- assertVisible:
    text: "Saved"
    timeout: 5000
    optional: true

# Go back to notes list
- pressKey: back

# --- Test 4: Verify data persists across app restart while offline ---
# (airplane mode still on — app should show local data from SQLite)
- launchApp

- assertVisible:
    text: "Notebooks"
    timeout: 10000
- tapOn: "E2E Test Notebook"

# Both the pre-existing note and the offline-created note must survive restart
- assertVisible:
    text: "Renamed E2E Note"
    timeout: 5000
- assertVisible:
    text: "Offline Note"
    timeout: 5000

# Offline indicator should still be visible
- assertVisible:
    text: "Offline"
    timeout: 5000

# --- Test 5: Go back online and verify sync ---
- toggleAirplaneMode

# Wait for sync to kick in
- assertVisible:
    text: "Syncing"
    timeout: 10000
    optional: true

# Verify both notes persist after sync completes
- assertVisible:
    text: "Offline Note"
    timeout: 10000
- assertVisible:
    text: "Renamed E2E Note"
    timeout: 5000

# --- Cleanup: delete the offline-created note ---
- swipe:
    from:
      text: "Offline Note"
    direction: LEFT
- assertVisible: "Move to Trash"
- tapOn: "Trash"
- assertNotVisible: "Offline Note"
