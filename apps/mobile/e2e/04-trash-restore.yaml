appId: eu.drafto.mobile
---
# Flow 04: Tab navigation (Notebooks ↔ Trash)
# Depends on: 02-create-notebook (NB <RUN_ID> exists)
# Pass -e RUN_ID=<timestamp> when running

# Full restart to land on Notebooks tab
- stopApp
- clearState
- launchApp

# Wait for Notebooks tab
- extendedWaitUntil:
    visible: "Notebooks"
    timeout: 60000

# Wait for sync to pull data
- extendedWaitUntil:
    visible: ".*NB ${RUN_ID}.*"
    timeout: 15000

# --- Test: navigate to Trash tab ---
# iOS: "Trash, tab, 2 of 3" — use "tab" to avoid matching swipe action "trash"
- tapOn: "Trash, tab.*"
- extendedWaitUntil:
    visible: "Trash"
    timeout: 10000

# --- Test: go back to Notebooks tab ---
- tapOn: "Notebooks, tab.*"
- extendedWaitUntil:
    visible: ".*NB ${RUN_ID}.*"
    timeout: 10000
