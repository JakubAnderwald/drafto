appId: eu.drafto.mobile
---
# iOS search flow
# Assumes user is already logged in (run after 01-login or ios-all)
# Run with: maestro test apps/mobile/e2e/ios-only/search.yaml --platform ios

- launchApp
- extendedWaitUntil:
    visible: "Notebooks"
    timeout: 30000

# Open search screen (tap the search button by testID)
- tapOn:
    id: "search-button"
- extendedWaitUntil:
    visible: "Search"
    timeout: 10000

# Type a search query
- tapOn: "Search notes and notebooks..."
- inputText: "test"

# Verify search executed — either results or empty state is acceptable
- extendedWaitUntil:
    visible: "No notes found"
    timeout: 10000
    optional: true

# Dismiss the search modal (iOS: swipe down to dismiss)
- swipe:
    direction: DOWN
    duration: 500
- extendedWaitUntil:
    visible: "Notebooks"
    timeout: 10000
