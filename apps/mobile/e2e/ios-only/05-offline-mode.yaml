appId: eu.drafto.mobile
---
# Flow 05 (iOS): Offline mode — airplane mode toggle, verify local data persists
# Depends on: 03-create-edit-note (NoteR <RUN_ID> / NoteF <RUN_ID> exists in NB <RUN_ID>)
# Pass -e RUN_ID=<timestamp> when running
# Run with: maestro test apps/mobile/e2e/ios-only/05-offline-mode.yaml --platform ios

- launchApp

# Navigate to the test notebook
- extendedWaitUntil:
    visible: "Notebooks"
    timeout: 10000
- tapOn: ".*NB ${RUN_ID}"

# Verify existing note is visible before going offline
- assertVisible: ".*NoteR ${RUN_ID}.*"

# --- Test 1: Enable airplane mode and verify offline indicator ---
- toggleAirplaneMode

- assertVisible: "Offline"

# --- Test 2: Create a note while offline ---
- tapOn:
    id: "add"
- tapOn: "Note title (optional)"
- inputText: "OffNote ${RUN_ID}"
- tapOn:
    id: "checkmark"

# Verify the offline note appears in the local list
- assertVisible: ".*OffNote ${RUN_ID}.*"

# --- Test 3: Edit an existing note while offline ---
- tapOn: ".*NoteR ${RUN_ID}.*"
- assertVisible: ".*NoteR ${RUN_ID}.*"

# Verify auto-save indicator works offline (saved locally)
- extendedWaitUntil:
    visible: "Saved"
    timeout: 10000
    optional: true

# Go back to notes list (iOS: tap header back button)
- tapOn: "Notes"

# --- Test 4: Verify data persists across app restart while offline ---
# (airplane mode still on — app should show local data from SQLite)
- launchApp

- extendedWaitUntil:
    visible: "Notebooks"
    timeout: 10000
- tapOn: ".*NB ${RUN_ID}"

# Both the pre-existing note and the offline-created note must survive restart
- assertVisible: ".*NoteR ${RUN_ID}.*"
- assertVisible: ".*OffNote ${RUN_ID}.*"

# Offline indicator should still be visible
- assertVisible: "Offline"

# --- Test 5: Go back online and verify sync ---
- toggleAirplaneMode

# Wait for sync to kick in
- extendedWaitUntil:
    visible: "Syncing"
    timeout: 10000
    optional: true

# Verify both notes persist after sync completes
- extendedWaitUntil:
    visible: ".*OffNote ${RUN_ID}.*"
    timeout: 10000
- assertVisible: ".*NoteR ${RUN_ID}.*"

# --- Cleanup: delete the offline-created note ---
- swipe:
    from:
      text: ".*OffNote ${RUN_ID}.*"
    direction: LEFT
- assertVisible: "Move to Trash"
- tapOn: "Trash"
- assertNotVisible: ".*OffNote ${RUN_ID}.*"
