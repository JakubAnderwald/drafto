appId: eu.drafto.mobile
---
# Flow 06: Offline notebook creation and multi-operation sync
# Depends on: 01-login (user is logged in)
# Pass -e RUN_ID=<timestamp> when running
# Tests: create notebook offline, create note inside it offline,
#         all queued operations sync correctly on reconnect

- launchApp

- extendedWaitUntil:
    visible: "Notebooks"
    timeout: 10000

# --- Test 1: Go offline and create a notebook ---
- toggleAirplaneMode

- assertVisible: "Offline"

- tapOn:
    id: "add"
- assertVisible: "Notebook name"
- inputText: "OffNB ${RUN_ID}"
- tapOn:
    id: "checkmark"

# Verify notebook appears in local list
- assertVisible: ".*OffNB ${RUN_ID}"

# --- Test 2: Create a note inside the offline notebook ---
- tapOn: ".*OffNB ${RUN_ID}"

- tapOn:
    id: "add"
- tapOn: "Note title (optional)"
- inputText: "OffNest ${RUN_ID}"
- tapOn:
    id: "checkmark"

- assertVisible: ".*OffNest ${RUN_ID}.*"

# Go back to notebooks list
- pressKey: back

# --- Test 3: Verify pending changes indicator ---
- assertVisible: "Offline"

# --- Test 4: Reconnect and verify all operations sync ---
- toggleAirplaneMode

# Wait for sync
- extendedWaitUntil:
    visible: "Syncing"
    timeout: 10000
    optional: true

# Verify the offline notebook still exists after sync
- extendedWaitUntil:
    visible: ".*OffNB ${RUN_ID}"
    timeout: 10000

# Verify the note inside it survived sync
- tapOn: ".*OffNB ${RUN_ID}"
- assertVisible: ".*OffNest ${RUN_ID}.*"

# --- Cleanup: delete the note and notebook ---
- swipe:
    from:
      text: ".*OffNest ${RUN_ID}.*"
    direction: LEFT
- assertVisible: "Move to Trash"
- tapOn: "Trash"
- pressKey: back

- swipe:
    from:
      text: ".*OffNB ${RUN_ID}"
    direction: LEFT
- extendedWaitUntil:
    notVisible: ".*OffNB ${RUN_ID}"
    timeout: 5000
