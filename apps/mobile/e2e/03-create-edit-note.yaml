appId: eu.drafto.mobile
---
# Flow 03: Create, edit, and rename notes
# Depends on: 02-create-notebook (E2E Test Notebook exists)

- launchApp

# Navigate to the test notebook
- assertVisible:
    text: "Notebooks"
    timeout: 10000
- tapOn: "E2E Test Notebook"

# --- Test: empty state ---
- assertVisible:
    text: "No notes yet"
    timeout: 5000
    optional: true

# --- Test: create a note with title ---
- tapOn:
    id: "add"
- assertVisible: "Note title (optional)"
- inputText: "E2E Test Note"
- tapOn:
    id: "checkmark"

# Verify the note appears in the list
- assertVisible: "E2E Test Note"

# --- Test: create a note without title ---
- tapOn:
    id: "add"
- assertVisible: "Note title (optional)"
- tapOn:
    id: "checkmark"

# An untitled note should appear (shown as "Untitled" in the editor)

# --- Test: cancel note creation ---
- tapOn:
    id: "add"
- assertVisible: "Note title (optional)"
- inputText: "Cancelled Note"
- tapOn:
    id: "close"
- assertNotVisible: "Cancelled Note"

# --- Test: open note in editor ---
- tapOn: "E2E Test Note"

# Verify editor screen loads with note title
- assertVisible:
    text: "E2E Test Note"
    timeout: 5000

# --- Test: edit the note title ---
- tapOn: "E2E Test Note"
- clearText
- inputText: "Renamed E2E Note"

# Wait for auto-save
- assertVisible:
    text: "Saved"
    timeout: 5000

# --- Test: rename via long press on notes list ---
- pressKey: back

# Verify the renamed title shows in the list
- assertVisible:
    text: "Renamed E2E Note"
    timeout: 5000

# Long press to enter inline edit mode
- longPressOn: "Renamed E2E Note"
- clearText
- inputText: "E2E Final Note"
- tapOn:
    id: "checkmark"
- assertVisible: "E2E Final Note"

# --- Test: pull to refresh ---
- scroll:
    direction: DOWN
