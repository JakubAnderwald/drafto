appId: eu.drafto.mobile
---
# Flow 03: Create, edit, and rename notes
# Depends on: 02-create-notebook (NB <RUN_ID> exists)
# Pass -e RUN_ID=<timestamp> when running

- launchApp

# Navigate to the test notebook
- extendedWaitUntil:
    visible: "Notebooks"
    timeout: 30000
- tapOn: ".*NB ${RUN_ID}"

# --- Test: empty state ---
- extendedWaitUntil:
    visible: "No notes yet"
    timeout: 10000
    optional: true

# --- Test: create a note with title ---
- tapOn:
    id: "add"
- assertVisible: "Note title (optional)"
- inputText: "Note ${RUN_ID}"
- tapOn:
    id: "checkmark"

# Verify the note appears in the list (async DB write)
- extendedWaitUntil:
    visible: ".*Note ${RUN_ID}.*"
    timeout: 10000

# --- Test: create a note without title ---
- tapOn:
    id: "add"
- assertVisible: "Note title (optional)"
- tapOn:
    id: "checkmark"

# An untitled note should appear
- extendedWaitUntil:
    visible: ".*Untitled.*"
    timeout: 10000

# --- Test: cancel note creation ---
- tapOn:
    id: "add"
- assertVisible: "Note title (optional)"
- inputText: "Cancelled Note"
- tapOn:
    id: "close"
- assertNotVisible: ".*Cancelled Note"

# --- Test: open note in editor ---
- tapOn: ".*Note ${RUN_ID}.*"

# Verify editor screen loads with note title
- extendedWaitUntil:
    visible: ".*Note ${RUN_ID}.*"
    timeout: 10000

# --- Test: rename via long press on notes list ---
- tapOn: "Notes"

# Verify the title shows in the list
- extendedWaitUntil:
    visible: ".*Note ${RUN_ID}.*"
    timeout: 10000

# Long press to enter inline edit mode
- longPressOn: ".*Note ${RUN_ID}.*"
- eraseText
- inputText: "NoteF ${RUN_ID}"
- tapOn:
    id: "checkmark"
- extendedWaitUntil:
    visible: ".*NoteF ${RUN_ID}.*"
    timeout: 10000

# --- Test: pull to refresh ---
- swipe:
    direction: DOWN
