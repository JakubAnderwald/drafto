appId: eu.drafto.mobile
---
# Flow 01: Login
# Tests: error handling, successful login, session persistence
# No RUN_ID needed — this flow does not create user data

# --- Clean start ---
- clearKeychain
- launchApp:
    clearState: true

# Wait for JS bundle to load and login screen to render
- extendedWaitUntil:
    visible: "Log In"
    timeout: 60000
- assertVisible: "Sign in to your Drafto account"

# --- Test: successful login ---
- tapOn: "you@example.com"
- inputText: ${E2E_TEST_EMAIL}
- tapOn: "Sign in to your Drafto account"
- tapOn: "Your password"
- inputText: ${E2E_TEST_PASSWORD}
- tapOn: "Sign in to your Drafto account"
- tapOn:
    id: "login-button"

# Verify we land on the Notebooks tab
- extendedWaitUntil:
    visible: "Notebooks"
    timeout: 15000

# --- Test: session persistence across restart ---
- launchApp
- extendedWaitUntil:
    visible: "Notebooks"
    timeout: 30000

# Verify we are NOT shown the login screen again
- assertNotVisible: "Log In"
