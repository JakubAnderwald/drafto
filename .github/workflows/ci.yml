name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SKIP_ENV_VALIDATION: "true"
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - name: Check migration safety
        run: pnpm migration:check
      - run: pnpm audit --audit-level=high
        continue-on-error: true

  unit-and-integration-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run shared package tests
        run: cd packages/shared && pnpm test
      - name: Run web unit & integration tests with coverage
        run: cd apps/web && pnpm test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: apps/web/coverage/lcov.info

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check for required secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ]; then
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Supabase secrets not configured — skipping E2E tests"
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.check-secrets.outputs.has_secrets == 'true'
      - uses: pnpm/action-setup@v4
        if: steps.check-secrets.outputs.has_secrets == 'true'
      - uses: actions/setup-node@v4
        if: steps.check-secrets.outputs.has_secrets == 'true'
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
        if: steps.check-secrets.outputs.has_secrets == 'true'
      - run: cd apps/web && pnpm exec playwright install --with-deps chromium webkit
        if: steps.check-secrets.outputs.has_secrets == 'true'
      - run: cd apps/web && pnpm build
        if: steps.check-secrets.outputs.has_secrets == 'true'
        env:
          SENTRY_AUTH_TOKEN: ""
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - run: cd apps/web && pnpm test:e2e
        if: steps.check-secrets.outputs.has_secrets == 'true'
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: failure() && steps.check-secrets.outputs.has_secrets == 'true'
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  mobile-checks:
    name: Mobile Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Lint mobile
        run: cd apps/mobile && pnpm lint
      - name: Typecheck mobile
        run: cd apps/mobile && pnpm typecheck
      - name: Run mobile tests
        run: cd apps/mobile && pnpm test

  desktop-checks:
    name: Desktop Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Lint desktop
        run: cd apps/desktop && pnpm lint
      - name: Typecheck desktop
        run: cd apps/desktop && pnpm typecheck
      - name: Run desktop tests
        run: cd apps/desktop && pnpm test

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: unit-and-integration-tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage
          path: apps/web/coverage
      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
