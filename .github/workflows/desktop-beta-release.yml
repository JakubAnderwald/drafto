name: Desktop Beta Release

on:
  workflow_dispatch:

concurrency:
  group: desktop-beta-release-${{ github.ref }}
  cancel-in-progress: false

env:
  SKIP_ENV_VALIDATION: "true"
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  checks:
    name: Pre-release Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Lint desktop
        run: cd apps/desktop && pnpm lint
      - name: Typecheck desktop
        run: cd apps/desktop && pnpm typecheck
      - name: Run desktop tests
        run: cd apps/desktop && pnpm test
      - name: Run shared package tests
        run: cd packages/shared && pnpm test

  tag:
    name: Tag Desktop Release
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read desktop version and create tag
        run: |
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          TAG="desktop@${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created tag $TAG"
          fi

  build-macos:
    name: Build & Submit macOS (TestFlight)
    needs: checks
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: apps/desktop
      - name: Validate Match HTTPS auth secret
        run: |
          if [[ -z "${MATCH_GIT_BASIC_AUTHORIZATION:-}" ]]; then
            echo "::error::Missing secret: MATCH_GIT_BASIC_AUTHORIZATION"
            exit 1
          fi
        env:
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      - name: Build and submit to TestFlight
        working-directory: apps/desktop
        run: bundle exec fastlane mac beta
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
