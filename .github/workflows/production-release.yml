name: Production Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build and submit"
        required: true
        type: choice
        options:
          - all
          - ios
          - android

concurrency:
  group: production-release-${{ github.ref }}
  cancel-in-progress: false

env:
  SKIP_ENV_VALIDATION: "true"
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  checks:
    name: Pre-release Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Lint mobile
        run: cd apps/mobile && pnpm lint
      - name: Typecheck mobile
        run: cd apps/mobile && pnpm typecheck
      - name: Run mobile tests
        run: cd apps/mobile && pnpm test
      - name: Run shared package tests
        run: cd packages/shared && pnpm test

  build-ios:
    name: Build & Submit iOS (App Store)
    needs: checks
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: apps/mobile
      - name: Validate Match HTTPS auth secret
        run: |
          if [[ -z "${MATCH_GIT_BASIC_AUTHORIZATION:-}" ]]; then
            echo "::error::Missing secret: MATCH_GIT_BASIC_AUTHORIZATION"
            exit 1
          fi
        env:
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      - name: Build and submit to App Store
        id: build-ios
        working-directory: apps/mobile
        run: bundle exec fastlane ios production
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}

  build-android:
    name: Build & Submit Android (Production)
    needs: checks
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: apps/mobile
      - name: Set up Android signing
        working-directory: apps/mobile
        run: |
          printenv GOOGLE_PLAY_SERVICE_ACCOUNT_KEY > google-play-service-account.json
          printenv ANDROID_KEYSTORE_BASE64 | base64 --decode > /tmp/drafto-release.keystore
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      - name: Build and submit to Google Play Production
        id: build-android
        working-directory: apps/mobile
        run: bundle exec fastlane android production
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          ANDROID_KEYSTORE_PATH: /tmp/drafto-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}
          GOOGLE_PLAY_TRACK: production
